<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100">

  <!-- ICON -->
  <g transform="translate(10,10)">

    <!-- Globe -->
    <circle cx="40" cy="40" r="32" fill="#1E40AF"></circle>

    <!-- Latitude line -->
    <ellipse cx="40" cy="40" rx="24" ry="10" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"></ellipse>

    <!-- Longitude line -->
    <ellipse cx="40" cy="40" rx="10" ry="24" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"></ellipse>

    <!-- Mountain -->
    <polygon points="22,52 40,30 58,52" fill="#F59E0B"></polygon>

    <!-- Airplane trail -->
    <path d="M10 30 Q40 5 70 28" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round"></path>

    <!-- Airplane -->
    <polygon points="68,26 76,29 68,32" fill="#F59E0B"></polygon>

  </g>

  <!-- TEXT -->
  <text x="95" y="60" font-family="Inter, Poppins, Arial, sans-serif" font-size="42" font-weight="700" fill="#1E40AF" letter-spacing="1">
    Triplo
  </text>

</svg>