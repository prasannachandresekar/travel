<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triplo - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>

<body class="custom-bg-alt d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <!-- Theme Toggle (Floating) -->
    <div class="position-absolute top-0 end-0 p-4">
        <button class="btn btn-link nav-icon-btn dark-mode-toggle theme-toggle" aria-label="Toggle Dark Mode">
            <i class="bi bi-moon-stars"></i>
        </button>
    </div>

    <!-- Login Container -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <!-- Brand -->
                <div class="text-center mb-4">
                    <a href="index.html"
                        class="text-decoration-none d-inline-block shadow-sm rounded-circle p-2 bg-white mb-3">
                        <img src="assets/images/logo.svg" alt="Triplo Logo" height="48" class="brand-logo">
                    </a>
                    <h2 class="fw-bold text-dark mb-1">Welcome Back</h2>
                    <p class="text-muted small">Sign in to continue to Triplo.</p>
                </div>

                <!-- Login Card -->
                <div class="card custom-card-bg border-0 rounded-4 shadow-sm p-4">
                    <form>
                        <div class="mb-3">
                            <label class="form-label text-dark fw-medium small">Email address</label>
                            <input type="email" class="form-control rounded-3 py-2 custom-input"
                                placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-dark fw-medium small">Password</label>
                            <input type="password" class="form-control rounded-3 py-2 custom-input"
                                placeholder="Enter password">
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-muted small" for="rememberMe">Remember Me</label>
                            </div>
                            <a href="#" class="text-primary text-decoration-none small fw-medium">Forgot Password?</a>
                        </div>
                        <button type="submit"
                            class="btn btn-primary w-100 rounded-pill fw-bold py-2 mb-3 shadow-sm border-0 login-btn"
                            style="background-color: var(--primary-color);">Login</button>

                        <div class="text-center">
                            <span class="text-muted small">Don't have an account?</span>
                            <a href="signup.html" class="text-primary text-decoration-none small fw-bold">Sign up</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>

</html>
