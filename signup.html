<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triplo - Sign Up</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>

<body class="custom-bg-alt d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <!-- Theme Toggle (Floating) -->
    <div class="position-absolute top-0 end-0 p-4">
        <button class="btn btn-link nav-icon-btn dark-mode-toggle theme-toggle" aria-label="Toggle Dark Mode">
            <i class="bi bi-moon-stars"></i>
        </button>
    </div>

    <!-- Signup Container -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 w-100" style="max-width: 400px;">
                <!-- Brand -->
                <div class="text-center mb-4">
                    <a href="index.html" class="d-inline-block">
                        <img src="assets/images/logo.svg" alt="Triplo Logo" class="login-logo">
                    </a>
                </div>

                <!-- Signup Card -->
                <div class="card custom-card-bg border-0 rounded-4 shadow-sm p-4 mx-auto w-100"
                    style="max-width: 400px;">
                    <form>
                        <!-- Social logins -->
                        <div class="d-grid gap-2 mb-3">
                            <button type="button"
                                class="btn btn-outline-secondary py-2 rounded-pill fw-medium d-flex align-items-center justify-content-center gap-2 custom-input">
                                <i class="bi bi-google text-danger"></i> Continue with Google
                            </button>
                            <button type="button"
                                class="btn btn-outline-secondary py-2 rounded-pill fw-medium d-flex align-items-center justify-content-center gap-2 custom-input">
                                <i class="bi bi-facebook text-primary"></i> Continue with Facebook
                            </button>
                        </div>

                        <div class="position-relative my-4">
                            <hr class="border-secondary opacity-25">
                            <span
                                class="position-absolute top-50 start-50 translate-middle custom-card-bg px-3 small text-muted">or
                                signup with email</span>
                        </div>

                        <!-- Email form -->
                        <div class="mb-3">
                            <label class="form-label text-dark fw-medium small">Full Name</label>
                            <input type="text" class="form-control rounded-3 py-2 custom-input"
                                placeholder="e.g. John Doe">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-dark fw-medium small">Email address</label>
                            <input type="email" class="form-control rounded-3 py-2 custom-input"
                                placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-dark fw-medium small">Password</label>
                            <input type="password" class="form-control rounded-3 py-2 custom-input"
                                placeholder="Create password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-dark fw-medium small">Confirm Password</label>
                            <input type="password" class="form-control rounded-3 py-2 custom-input"
                                placeholder="Confirm password">
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="termsCheck">
                            <label class="form-check-label text-muted small" for="termsCheck">
                                I agree to the <a href="#" class="text-primary text-decoration-none">Terms &
                                    Conditions</a>
                            </label>
                        </div>

                        <button type="submit"
                            class="btn btn-primary w-100 rounded-pill fw-bold py-2 mb-3 shadow-sm border-0 login-btn"
                            style="background-color: var(--primary-color);color: #ffffff;">Create Account</button>

                        <div class="text-center mt-3">
                            <span class="text-muted small">Already have an account?</span>
                            <a href="login.html" class="text-primary text-decoration-none small fw-bold">Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>

</html>
